<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

.container{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

textarea{
    resize:vertical;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    font-size:16px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<form>

<!-- Container 1: Upload -->
<div class="container">
<label>Upload File</label><br>
<input type="file">
</div>

<!-- Container 2: Title -->
<div class="container">
<label>Title</label>
<input type="text" placeholder="Enter title">
</div>

<!-- Container 3: Author -->
<div class="container">
<label>Author</label>
<input type="text" placeholder="Enter author name">
</div>

<!-- Container 4: Description -->
<div class="container">
<label>Description</label>
<textarea placeholder="Write description here..."></textarea>
</div>

<!-- Container 5: Post Button -->
<div class="container">
<button type="submit">Post</button>
</div>

</form>

</body>
</html>
